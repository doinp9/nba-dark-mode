<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #141414;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header img {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      border-radius: 50%;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
    }

    .header .subtitle {
      font-size: 11px;
      color: #888;
      font-weight: 400;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #1e1e1e;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background-color: #3a3a3a;
      border-radius: 24px;
      cursor: pointer;
      transition: background-color 0.25s ease;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      border-radius: 50%;
      transition: transform 0.25s ease;
    }

    input:checked + .slider {
      background-color: #1d6fef;
    }

    input:checked + .slider::before {
      transform: translateX(20px);
    }

    .status {
      font-size: 11px;
      color: #666;
      text-align: center;
    }

    .status.active {
      color: #1d6fef;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon128.png" alt="NBA Dark Mode">
    <div>
      <h1>NBA Dark Mode</h1>
      <div class="subtitle">nba.com</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Dark Mode</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status active" id="status">● Active</div>

  <script src="popup.js"></script>
</body>
</html>
